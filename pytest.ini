[pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --strict-config --maxfail=1
xfail_strict = true
markers =
    smoke: smoke test cases
    device: tests that require a connected Android device
    slow: long-running tests
    flaky: unstable tests that require extra attention
    feature(name): feature-scoped tests
