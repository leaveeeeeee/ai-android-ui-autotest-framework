default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: local
    hooks:
      - id: check-commit-message
        name: 校验提交信息格式
        entry: python3 scripts/check_commit_message.py
        language: system
        stages: [commit-msg]
        pass_filenames: true

      - id: local-pr-gate
        name: 执行本地 PR 门禁
        entry: bash -c 'PYTHON_BIN="${PYTHON_BIN:-}" ./scripts/check_pr_gate.sh'
        language: system
        stages: [pre-push]
        pass_filenames: false
